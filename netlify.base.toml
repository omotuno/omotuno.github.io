[build]
  command = "yarn build"
  publish = "dist"
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = false
  minify = true
[build.processing.js]
  bundle = false
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = false
[[redirects]]
  from = "/github"
  to = "https://github.com/omotuno"
  status = 301
  force = true
[[redirects]]
  from = "/medium"
  to = "https://medium.com/@olusegunomotunde"
  status = 301
  force = true
[[redirects]]
  from = "/aws"
  to = "https://builder.aws.com/"
  status = 301
  force = true
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
